services:
  db:
    image: postgres:16-alpine
    container_name: taysir-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taysir_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taysir_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  web:
    build: .
    container_name: taysir-app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_PRISMA_URL: postgresql://postgres:postgres@db:5432/taysir_db?schema=public
      POSTGRES_URL_NON_POOLING: postgresql://postgres:postgres@db:5432/taysir_db?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: changeme
    ports:
      - "3000:3000"
    volumes:
      - ./public/uploads:/app/public/uploads
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

volumes:
  postgres_data: