<!doctype html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans)}
.row{display:flex;gap:10px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;font:600 14px var(--font-sans);border-radius:var(--r-md);padding:10px 18px;cursor:pointer;border:1px solid transparent;transition:all 220ms var(--ease)}
.btn--primary{background:var(--brand-500);color:#fff}
.btn--primary:hover{background:var(--brand-700);transform:translateY(-1px);box-shadow:var(--shadow-2)}
.btn--ghost{background:transparent;color:var(--brand-500);border-color:var(--brand-500)}
.btn--ghost:hover{background:rgba(26,122,137,.06)}
.btn--dark{background:var(--brand-900);color:#fff}
.btn--on-dark{background:transparent;color:#fff;border-color:rgba(255,255,255,.35)}
.btn--sm{padding:7px 12px;font-size:13px;border-radius:8px}
.btn--lg{padding:14px 22px;font-size:16px}
.wrap{display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start}
.dark{background:var(--brand-900);padding:14px;border-radius:12px}
.lbl{font-size:11px;font-weight:600;color:var(--fg3);margin:0 0 10px;letter-spacing:.08em;text-transform:uppercase}
</style></head><body>
<div class="lbl">Buttons</div>
<div class="wrap">
  <div class="row">
    <button class="btn btn--primary">Commencer</button>
    <button class="btn btn--ghost">Voir la démo</button>
    <button class="btn btn--primary btn--sm">Sm</button>
    <button class="btn btn--primary btn--lg">Essai gratuit</button>
  </div>
  <div class="dark row">
    <button class="btn btn--primary">Commencer</button>
    <button class="btn btn--on-dark">Voir la démo</button>
  </div>
</div>
</body></html>
