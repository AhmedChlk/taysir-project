<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
.row{display:flex;gap:12px;align-items:stretch}
.sw{flex:1;min-height:92px;border-radius:var(--r-md);padding:12px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--line)}
.sw .nm{font-size:12px;font-weight:600}
.sw .hx{font-size:11px;opacity:.75;font-variant-numeric:tabular-nums}
.lbl{font-size:11px;font-weight:600;color:var(--fg3);margin:0 0 10px;letter-spacing:.08em;text-transform:uppercase}
</style></head><body>
<div class="lbl">Brand palette</div>
<div class="row">
  <div class="sw" style="background:#0F515C;color:#fff;border-color:transparent"><div class="nm">brand-900</div><div class="hx">#0F515C · Hero, footer</div></div>
  <div class="sw" style="background:#145F6C;color:#fff;border-color:transparent"><div class="nm">brand-700</div><div class="hx">#145F6C · CTA hover</div></div>
  <div class="sw" style="background:#1A7A89;color:#fff;border-color:transparent"><div class="nm">brand-500</div><div class="hx">#1A7A89 · Primary accent</div></div>
  <div class="sw" style="background:#79B3BC;color:#fff;border-color:transparent"><div class="nm">brand-300</div><div class="hx">#79B3BC · Disabled</div></div>
  <div class="sw" style="background:#E6F2F4;color:#0F515C"><div class="nm">brand-50</div><div class="hx">#E6F2F4 · Wash</div></div>
</div>
</body></html>
