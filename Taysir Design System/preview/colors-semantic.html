<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
.row{display:flex;gap:12px}
.sw{flex:1;padding:14px 14px 12px;border-radius:var(--r-md);border:1px solid var(--line);background:#fff}
.dot{width:16px;height:16px;border-radius:999px;margin-bottom:8px}
.nm{font-size:12px;font-weight:600;color:var(--fg1)}
.hx{font-size:11px;color:var(--fg3);font-variant-numeric:tabular-nums;margin-top:2px}
.lbl{font-size:11px;font-weight:600;color:var(--fg3);margin:0 0 10px;letter-spacing:.08em;text-transform:uppercase}
</style></head><body>
<div class="lbl">Semantic</div>
<div class="row">
  <div class="sw"><div class="dot" style="background:#16A34A"></div><div class="nm">success</div><div class="hx">#16A34A · Validation checks</div></div>
  <div class="sw"><div class="dot" style="background:#DCFCE7;border:1px solid #bbe8c4"></div><div class="nm">success-50</div><div class="hx">#DCFCE7 · Success bg</div></div>
  <div class="sw"><div class="dot" style="background:#DC2626"></div><div class="nm">danger</div><div class="hx">#DC2626 · Destructive</div></div>
  <div class="sw"><div class="dot" style="background:#1A7A89"></div><div class="nm">info / link</div><div class="hx">brand-500 · doubles as info</div></div>
</div>
</body></html>
