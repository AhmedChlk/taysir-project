<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans);color:var(--fg1)}
.lbl{font-size:11px;font-weight:600;color:var(--fg3);margin:0 0 14px;letter-spacing:.08em;text-transform:uppercase}
.row{display:flex;gap:16px;align-items:flex-end}
.b{background:var(--brand-50);border:1px dashed #bcd8dd;color:var(--brand-900);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:11px}
.tag{font-size:10px;color:var(--fg3);margin-top:4px;text-align:center}
</style></head><body>
<div class="lbl">Spacing scale — 8pt grid</div>
<div class="row">
  <div><div class="b" style="width:4px;height:40px"></div><div class="tag">s‑1<br>4</div></div>
  <div><div class="b" style="width:8px;height:40px"></div><div class="tag">s‑2<br>8</div></div>
  <div><div class="b" style="width:12px;height:40px"></div><div class="tag">s‑3<br>12</div></div>
  <div><div class="b" style="width:16px;height:40px"></div><div class="tag">s‑4<br>16</div></div>
  <div><div class="b" style="width:24px;height:40px"></div><div class="tag">s‑6<br>24</div></div>
  <div><div class="b" style="width:32px;height:40px"></div><div class="tag">s‑8<br>32</div></div>
  <div><div class="b" style="width:56px;height:40px"></div><div class="tag">s‑12<br>56</div></div>
  <div><div class="b" style="width:80px;height:40px"></div><div class="tag">s‑16<br>80</div></div>
  <div><div class="b" style="width:128px;height:40px"></div><div class="tag">s‑24<br>128</div></div>
</div>
</body></html>
