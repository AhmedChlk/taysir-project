<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
.row{display:flex;gap:12px;align-items:stretch}
.sw{flex:1;min-height:92px;border-radius:var(--r-md);padding:12px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--line)}
.sw .nm{font-size:12px;font-weight:600}
.sw .hx{font-size:11px;opacity:.75;font-variant-numeric:tabular-nums}
.lbl{font-size:11px;font-weight:600;color:var(--fg3);margin:0 0 10px;letter-spacing:.08em;text-transform:uppercase}
</style></head><body>
<div class="lbl">Ink & surfaces</div>
<div class="row">
  <div class="sw" style="background:#0B1220;color:#fff;border-color:transparent"><div class="nm">ink-900</div><div class="hx">#0B1220 · Primary text</div></div>
  <div class="sw" style="background:#384152;color:#fff;border-color:transparent"><div class="nm">ink-700</div><div class="hx">#384152 · Secondary</div></div>
  <div class="sw" style="background:#6B7280;color:#fff;border-color:transparent"><div class="nm">ink-500</div><div class="hx">#6B7280 · Muted</div></div>
  <div class="sw" style="background:#E5E7EB"><div class="nm">line</div><div class="hx">#E5E7EB · Hairline</div></div>
  <div class="sw" style="background:#F9FAFB"><div class="nm">surface-50</div><div class="hx">#F9FAFB · Soft bg</div></div>
  <div class="sw" style="background:#FFFFFF"><div class="nm">surface-0</div><div class="hx">#FFFFFF · Canvas</div></div>
</div>
</body></html>
