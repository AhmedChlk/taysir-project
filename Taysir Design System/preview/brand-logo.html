<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);display:flex;align-items:center;justify-content:center;min-height:260px}
.stage{display:flex;gap:40px;align-items:center;padding:24px}
.c{display:flex;flex-direction:column;align-items:center;gap:10px}
.c img{width:96px;height:auto}
.c .mark{width:72px;height:auto}
.cap{font-size:11px;color:var(--fg3);text-align:center}
.dark{background:#0F515C;padding:16px 24px;border-radius:12px;display:flex;align-items:center;justify-content:center;height:120px}
.dark img{filter:brightness(0) invert(1)}
</style></head><body>
<div class="stage">
  <div class="c"><img src="../assets/logo-cropped.png" alt="taysir"><div class="cap">Primary lockup · light</div></div>
  <div class="c"><div class="dark"><img src="../assets/logo-cropped.png" alt="taysir"></div><div class="cap">On dark teal · white</div></div>
  <div class="c"><img class="mark" src="../assets/logo-mark.png" alt="mark"><div class="cap">Mark only · favicon</div></div>
</div>
</body></html>
