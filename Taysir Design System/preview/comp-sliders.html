<!doctype html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans);color:var(--fg1)}
.row{display:flex;align-items:center;gap:18px;margin-bottom:14px}
.val{font-variant-numeric:tabular-nums;font-weight:600;color:var(--brand-900);min-width:64px;font-size:15px}
.track{flex:1;position:relative;height:6px;background:#E5E7EB;border-radius:999px}
.fill{position:absolute;left:0;top:0;height:100%;background:var(--brand-500);border-radius:999px}
.thumb{position:absolute;top:50%;width:20px;height:20px;background:#fff;border:2px solid var(--brand-500);border-radius:999px;transform:translate(-50%,-50%);box-shadow:var(--shadow-1)}
.lbl-s{font-size:12px;font-weight:500;color:var(--fg2);min-width:160px}
.lbl{font-size:11px;font-weight:600;color:var(--fg3);margin:0 0 14px;letter-spacing:.08em;text-transform:uppercase}
</style></head><body>
<div class="lbl">Sliders (ROI simulator)</div>
<div class="row">
  <div class="lbl-s">Taille de l'équipe</div>
  <div class="track"><div class="fill" style="width:34%"></div><div class="thumb" style="left:34%"></div></div>
  <div class="val">12</div>
</div>
<div class="row">
  <div class="lbl-s">Heures perdues / semaine</div>
  <div class="track"><div class="fill" style="width:62%"></div><div class="thumb" style="left:62%"></div></div>
  <div class="val">9 h</div>
</div>
<div class="row">
  <div class="lbl-s">Salaire moyen horaire</div>
  <div class="track"><div class="fill" style="width:48%"></div><div class="thumb" style="left:48%"></div></div>
  <div class="val">32 €</div>
</div>
</body></html>
