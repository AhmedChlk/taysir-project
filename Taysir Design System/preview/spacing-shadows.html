<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:32px;background:#F9FAFB;font-family:var(--font-sans);color:var(--fg1)}
.lbl{font-size:11px;font-weight:600;color:var(--fg3);margin:0 0 24px;letter-spacing:.08em;text-transform:uppercase}
.row{display:flex;gap:28px}
.c{flex:1;display:flex;flex-direction:column;align-items:center;gap:14px}
.s{width:100%;height:72px;background:#fff;border-radius:14px}
.s1{box-shadow:var(--shadow-1)}
.s2{box-shadow:var(--shadow-2)}
.s3{box-shadow:var(--shadow-3)}
.t{font-size:11px;color:var(--fg3);text-align:center;line-height:1.5}
b{color:var(--fg1)}
</style></head><body>
<div class="lbl">Elevation</div>
<div class="row">
  <div class="c"><div class="s s1"></div><div class="t"><b>shadow‑1</b><br>resting cards</div></div>
  <div class="c"><div class="s s2"></div><div class="t"><b>shadow‑2</b><br>pricing, ROI card</div></div>
  <div class="c"><div class="s s3"></div><div class="t"><b>shadow‑3</b><br>hero mockup, modals</div></div>
</div>
</body></html>
