<!doctype html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:22px;background:#F9FAFB;font-family:var(--font-sans);color:var(--fg1)}
.row{display:flex;gap:16px;flex-wrap:wrap}
.card{background:#fff;border-radius:var(--r-lg);padding:18px;box-shadow:var(--shadow-1);border:1px solid var(--line);flex:1;min-width:200px;transition:all 220ms var(--ease)}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-2)}
.card.float{box-shadow:var(--shadow-2);border-color:transparent}
.card.feature{border-color:var(--brand-500);border-width:1.5px;position:relative}
.badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--brand-500);color:#fff;font:600 11px var(--font-sans);padding:5px 10px;border-radius:999px;letter-spacing:.02em}
h3{margin:0 0 4px}
.meta{font-size:12px;color:var(--fg3)}
.lbl{width:100%;font-size:11px;font-weight:600;color:var(--fg3);margin:0 0 4px;letter-spacing:.08em;text-transform:uppercase}
</style></head><body>
<div class="row">
  <div class="lbl">Cards</div>
  <div class="card"><h3>Basique</h3><div class="meta">shadow‑1 · resting</div></div>
  <div class="card float"><h3>Flottante</h3><div class="meta">shadow‑2 · ROI, modals</div></div>
  <div class="card feature"><div class="badge">Le plus populaire</div><h3>En avant</h3><div class="meta">1.5px brand‑500 outline</div></div>
</div>
</body></html>
