name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Hard gate: lint + typecheck + tests must pass.
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Biome (fails on errors)
        run: npx biome check src
      - name: ESLint
        run: npx eslint .
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Tests + coverage
        run: npx vitest run --coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info
          if-no-files-found: warn

  # SonarQube/SonarCloud analysis. Requires repo secrets SONAR_TOKEN and
  # SONAR_HOST_URL (https://sonarcloud.io for SonarCloud, org ahmedchoulak2004).
  # coverage/lcov.info is produced by vitest and read via sonar-project.properties.
  sonar:
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Sonar needs full history for blame/new-code detection
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx vitest run --coverage
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v4
        # Until SONAR_TOKEN/SONAR_HOST_URL secrets are set, don't fail the pipeline.
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
